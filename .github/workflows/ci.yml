name: conformance

on: [push, pull_request]

jobs:
  python-cpp:
    runs-on: ubuntu-latest
    # CI runs the synthetic-but-faithful corpus (synth.py) -- no real datasets are downloaded or
    # committed (they're large/slow); the real corpus + sweep run locally. See python/tests/corpus.py.
    # Version matrix: `latest` runs the full suite on the newest deps; `pinned-old` runs the
    # corpus-free core tests on the **support floor** -- oldest zarr lstar runs on (3.1.0, the first
    # release where Group.create_array accepts data=) AND old anndata (0.8) -- guarding both the
    # zarr-version floor and lstar's anndata-version handling without coupling to scanpy/mudata
    # (whose synthetic fixtures need newer anndata), so it stays a clean, coherent old-deps check.
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: latest
            pip: 'numpy scipy "zarr>=3.1" anndata scanpy mudata'
            tests: 'test_roundtrip test_anndata_profile test_crossimpl test_validate test_versions test_lazy test_stream_write test_categorical test_induce test_nullable test_aux test_de test_tier1_promote test_real_atlas test_mudata test_partial test_spatial test_fuzz test_legacy_format test_determinism test_collection_reduce test_arity3 test_v3_format'
          - tag: pinned-old
            pip: '"numpy<2" scipy "zarr==3.1.0" "anndata==0.8.0"'   # support floor: oldest zarr (3.1.0) + old anndata (0.8, predates numpy 2.0)
            # core lstar tests only; exclude ones that drive anndata's *h5ad writer* for newer dtypes
            # (test_stream_write writes a pandas StringArray, which anndata 0.8's writer can't serialize).
            tests: 'test_roundtrip test_crossimpl test_validate test_versions test_lazy test_categorical test_aux test_partial test_fuzz test_legacy_format test_determinism test_collection_reduce test_arity3'
    env:
      LSTAR_SYNTHETIC_CORPUS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The Python reference impl uses the zarr-python 3 library (zarr>=3.1) but still writes the
      # v2 on-disk FORMAT (zarr_format=2), so the C++/R/JS readers are unchanged. Library != format.
      - run: pip install ${{ matrix.pip }}
      # libzstd lets the C++ core read zstd-compressed chunks -- zarr-python 3's DEFAULT v3 compressor,
      # so it's what externally-produced v3 stores use (exercised by the v3 format leg below).
      - name: system deps (zstd)
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev
      - name: build libstar (C++ core)
        run: cmake -S core -B core/build -DCMAKE_BUILD_TYPE=Release && cmake --build core/build -j2
      - name: binding-parity tripwire (a shared kernel bound in one surface must be bound in all)
        run: python conformance/binding_parity.py
      - name: python tests + Python<->C++ cross-impl
        run: |
          for t in ${{ matrix.tests }}; do
            echo "== $t =="; PYTHONPATH=python/src python3 python/tests/$t.py
          done
      # test_viewer.py is pytest-style (fixtures), so it's outside the standalone-script loop above;
      # run its pure extend_for_viewer(primary=) unit cases here (the Python side of the cross-surface
      # primary= parity leg). latest only — pytest + the deps aren't in the pinned-old matrix.
      - name: viewer primary= unit tests (pytest)
        if: matrix.tag == 'latest'
        run: pip install -q pytest && PYTHONPATH=python/src python3 -m pytest python/tests/test_viewer.py -q -k primary
      - name: chunked+gzip cross-impl (Python -> C++ -> Python) + transpose
        run: bash conformance/chunked.sh
      # v3 format: C++ reads/writes v3, cross-conformant with zarr-python 3 (incl. its zstd default).
      # latest only -- the verifier drives zarr-python's create_group/consolidate_metadata, whose API
      # is exercised on the newest deps; the floor job still compiles all v3 code paths in the core build.
      - name: Zarr v3 format (C++ <-> zarr-python; read both, write v3, zstd default)
        if: matrix.tag == 'latest'
        run: bash conformance/v3_format.sh
      - name: single-file .lstar.zarr.zip parity (Python + C++ + CLI + STORED/ZIP64 guardrails)
        run: bash conformance/zip.sh

  r-cross-format:
    runs-on: ubuntu-latest
    env:
      LSTAR_SYNTHETIC_CORPUS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy scipy "zarr>=3.1" anndata scanpy mudata
      - uses: r-lib/actions/setup-r@v2
        with:
          # Public Posit Package Manager: precompiled Linux binaries (with all system/transitive
          # deps) instead of source builds -- source-installing Seurat fails on the CI runner
          # (missing httr/miniUI/plotly/png/reticulate/shiny system deps).
          use-public-rspm: true
      - name: R dependencies (CRAN + Bioconductor)
        run: |
          # CRAN packages as PPM binaries (use-public-rspm) -- Seurat + all transitive deps resolved
          # without source-building httr/miniUI/plotly/png/reticulate/shiny (the prior CI failure).
          Rscript -e 'install.packages(c("cpp11","Matrix","Seurat","SeuratObject","BiocManager"))'
          # Bioconductor core (CRAN deps still resolve as PPM binaries via getOption("repos")). These are
          # source-installed from bioconductor.org, whose downloads are intermittently flaky -- and a failed
          # download surfaces only as a WARNING (install doesn't abort), leaving the package missing and the
          # cross_format test dying later on library(SingleCellExperiment). So RETRY until they're actually
          # loadable, and fail loudly only if genuinely unavailable.
          Rscript -e 'pkgs <- c("SingleCellExperiment","S4Vectors","SummarizedExperiment")
            for (i in 1:4) {
              miss <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
              if (!length(miss)) break
              message("Bioc install attempt ", i, ": ", paste(miss, collapse = ", "))
              tryCatch(BiocManager::install(miss, update = FALSE, ask = FALSE),
                       error = function(e) message(conditionMessage(e)))
              if (i < 4) Sys.sleep(15)
            }
            miss <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
            if (length(miss)) stop("Bioconductor packages unavailable after retries: ", paste(miss, collapse = ", "))'
          # Signac so the synthetic ChromatinAssay case runs in CI -- TOLERANT: if it won't install on the
          # runner (heavy Bioc/system deps), the case degrades to a recorded SKIP and CI stays green.
          Rscript -e 'tryCatch(BiocManager::install("Signac", update=FALSE, ask=FALSE), error=function(e) message("Signac unavailable: ", conditionMessage(e)))'
      - name: install lstar R package
        run: |
          mkdir -p .Rlib
          R CMD INSTALL --preclean --no-multiarch --library=.Rlib R
      - name: categorical-encoding conformance (codes/categories/ordered/-1 across Py/C++/R)
        run: bash conformance/categorical.sh
      - name: induction conformance (factor axis + induced_by round-trip + checkable consistency across Py/C++/R)
        run: bash conformance/induce.sh
      - name: nullable conformance (validity-mask nullable Int/boolean/string round-trip across Py/C++/R)
        run: bash conformance/nullable.sh
      - name: aux passthrough conformance (uns/@misc subtree round-trips verbatim across Py/C++/R)
        run: bash conformance/passthrough.sh
      - name: provenance conformance (field provenance incl. normalization recipe survives the R path)
        run: bash conformance/provenance.sh
      - name: R-path fidelity (float32 value dtype + graph directed/weighted survive Py->R->Py)
        run: bash conformance/r_fidelity.sh
      - name: Zarr v3 on the R surface (R reads both v2+v3; writes v3; zarr-python confirms)
        run: bash conformance/v3_r.sh
      - name: single-file .lstar.zarr.zip parity (R <-> Python via the C++ core .zip dispatch)
        run: bash conformance/zip_r.sh
      - name: partial-coverage conformance (partial index over a derived union axis survives the R path)
        run: bash conformance/partial.sh
      - name: arity-3 conformance (3-axis CCC/eQTL tensor survives Py->R->Py, 3rd axis intact)
        run: bash conformance/arity3.sh
      - name: DE-bundle conformance (rank_genes_groups -> (factor,genes) bundle; lstar_markers Py + R)
        run: bash conformance/de.sh
      - name: cross-format conformance (AnnData <-> Seurat <-> SCE via L*)
        run: bash conformance/cross_format.sh
      - name: convert CLI (lstar convert detect/route + fidelity report + native-acceptance of the target)
        run: bash conformance/convert_cli.sh
      - name: Seurat Tier-1 extras (DimReduc stdev -> measure; active Idents captured + restored)
        run: bash conformance/seurat_extras.sh
      - name: Seurat version variety (v3 Assay / v5 Assay5 / v5 split / SCTAssay / multimodal)
        run: bash conformance/seurat_versions.sh
      - name: Seurat v2 (pre-Assay legacy 'seurat' class -> read + old-to-new conversion)
        run: bash conformance/seurat_v2.sh
      - name: SCE version variety (counts / +reducedDims / +altExps / +colData-rowData factors+metadata)
        run: bash conformance/sce_versions.sh
      - name: local real Seurat/SCE corpus (skips in CI; SeuratData/scRNAseq not installed)
        run: bash conformance/real_corpus_r.sh
      - name: collection conformance (collection of samples R -> L* -> Python)
        run: bash conformance/collection.sh
      - name: true-collection conformance (collection_from divergent + disjoint/cross-species; Py<->R; pseudobulk)
        run: bash conformance/collection_true.sh
      - name: conos conversions (collection -> Seurat v5 split + AnnData; real Conos leg skips, synthetic leg runs)
        run: bash conformance/conos.sh
      - name: blocked-reader conformance (R/C++ bounded col stats == full read)
        run: bash conformance/stream_reduce.sh
      - name: fused-view reducer conformance (depth+log1p mean/var + grouped sum == in-memory)
        run: bash conformance/fused_view.sh
      - name: block-reader conformance (lstar_read_block / read_genes == full read)
        run: bash conformance/read_block.sh
      - name: R writer chunking/compression (R-written chunked+gzip readable by Py/C++)
        run: bash conformance/r_write_chunked.sh
      - name: disk-backed targets (backed AnnData always; Seurat+BPCells / SCE+HDF5Array skip if absent)
        run: bash conformance/backed_targets.sh
      - name: viewer@0.1 grouping-policy linter (Python + R lists match the canonical)
        run: python conformance/policy_linter.py
      - name: viewer@0.1 cross-surface parity (Python prep == native R extend_for_viewer, incl. cell-major layout)
        run: bash conformance/viewer.sh
      - name: viewer@0.1 corpus-driven parity (convert corpus -> prep -> Py==R on all fields; synthetic-faithful in CI)
        run: bash conformance/viewer_corpus.sh
      - name: extend_for_viewer(primary=) cross-surface parity (Py==R reorder keyed on a given primary)
        run: bash conformance/viewer_primary.sh
      - name: Seurat -> extend_for_viewer (boolean QC not a grouping; active-idents not duplicated; opens on a clustering)
        run: bash conformance/viewer_seurat.sh

  js-wasm:
    runs-on: ubuntu-latest
    env:
      LSTAR_SYNTHETIC_CORPUS: "1"          # viewer_corpus.sh: synthetic-faithful corpus (no real data)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # make_store.py drives the Python L* writer (PYTHONPATH=python/src) to emit the test store;
      # anndata/scanpy/mudata let viewer_corpus.sh build the synthetic corpus for the JS==Python leg.
      - run: pip install numpy scipy "zarr>=3.1" anndata scanpy mudata
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.0          # bundles node 22.16 -> supports `node --experimental-strip-types`
          actions-cache-folder: emsdk-cache
      - name: install JS deps (zarrita)
        run: cd js && npm install
      - name: JS/WASM conformance (build WASM kernels + Node kernels/reader/view vs Python store)
        run: bash conformance/js.sh
      - name: viewer@0.1 grouping-policy linter (Python + JS lists match the canonical)
        run: python conformance/policy_linter.py
      - name: JS viewer@0.1 parity (lstar's own extend-viewer.ts == Python prep; CSC + CSR counts)
        run: bash conformance/viewer_js.sh
      - name: viewer@0.1 corpus-driven JS parity (convert corpus -> JS extend == Python; real categoricals + lognorm + embeddings)
        run: bash conformance/viewer_corpus.sh
      - name: extend_for_viewer(primary=) cross-surface parity (Py==JS reorder keyed on a given primary)
        run: bash conformance/viewer_primary.sh
      - name: single-file .lstar.zarr.zip parity (JS ZipStore seek-into-zip + writer <-> Python)
        run: bash conformance/zip_js.sh
