name: conformance

on: [push, pull_request]

jobs:
  python-cpp:
    runs-on: ubuntu-latest
    # CI runs the synthetic-but-faithful corpus (synth.py) -- no real datasets are downloaded or
    # committed (they're large/slow); the real corpus + sweep run locally. See python/tests/corpus.py.
    # Version matrix: `latest` runs the full suite on the newest deps; `pinned-old` runs the
    # corpus-free core tests on **old anndata** (0.8) -- it guards lstar's anndata-version handling
    # without coupling to scanpy/mudata (whose synthetic fixtures need newer anndata), so it stays a
    # clean, coherent old-deps check.
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: latest
            pip: 'numpy scipy "zarr<3" anndata scanpy mudata'
            tests: 'test_roundtrip test_anndata_profile test_crossimpl test_validate test_versions test_lazy test_stream_write test_categorical test_induce test_nullable test_aux test_de test_tier1_promote test_real_atlas test_mudata test_partial test_spatial test_fuzz test_legacy_format'
          - tag: pinned-old
            pip: '"numpy<2" scipy "zarr<3" "anndata==0.8.0"'   # anndata 0.8 predates numpy 2.0 (removed np.float_ etc.)
            # core lstar tests only; exclude ones that drive anndata's *h5ad writer* for newer dtypes
            # (test_stream_write writes a pandas StringArray, which anndata 0.8's writer can't serialize).
            tests: 'test_roundtrip test_crossimpl test_validate test_versions test_lazy test_categorical test_aux test_partial test_fuzz test_legacy_format'
    env:
      LSTAR_SYNTHETIC_CORPUS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # NOTE: the Python reference impl currently targets the Zarr v2 API; the v3
      # port is pending (the C++ core targets v3). Pin zarr<3 until then.
      - run: pip install ${{ matrix.pip }}
      - name: build libstar (C++ core)
        run: cmake -S core -B core/build -DCMAKE_BUILD_TYPE=Release && cmake --build core/build -j2
      - name: python tests + Python<->C++ cross-impl
        run: |
          for t in ${{ matrix.tests }}; do
            echo "== $t =="; PYTHONPATH=python/src python3 python/tests/$t.py
          done
      - name: chunked+gzip cross-impl (Python -> C++ -> Python) + transpose
        run: bash conformance/chunked.sh

  r-cross-format:
    runs-on: ubuntu-latest
    env:
      LSTAR_SYNTHETIC_CORPUS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy scipy "zarr<3" anndata scanpy mudata
      - uses: r-lib/actions/setup-r@v2
        with:
          # Public Posit Package Manager: precompiled Linux binaries (with all system/transitive
          # deps) instead of source builds -- source-installing Seurat fails on the CI runner
          # (missing httr/miniUI/plotly/png/reticulate/shiny system deps).
          use-public-rspm: true
      - name: R dependencies (CRAN + Bioconductor)
        run: |
          # CRAN packages as PPM binaries (use-public-rspm) -- Seurat + all transitive deps resolved
          # without source-building httr/miniUI/plotly/png/reticulate/shiny (the prior CI failure).
          Rscript -e 'install.packages(c("cpp11","Matrix","Seurat","SeuratObject","BiocManager"))'
          # Bioconductor packages are C-light; source-installs succeed (they don't pull the
          # problem CRAN deps above). CRAN deps still resolve as PPM binaries via getOption("repos").
          Rscript -e 'BiocManager::install(c("SingleCellExperiment","S4Vectors","SummarizedExperiment"), update=FALSE, ask=FALSE)'
      - name: install lstar R package
        run: |
          mkdir -p .Rlib
          R CMD INSTALL --preclean --no-multiarch --library=.Rlib R
      - name: categorical-encoding conformance (codes/categories/ordered/-1 across Py/C++/R)
        run: bash conformance/categorical.sh
      - name: induction conformance (factor axis + induced_by round-trip + checkable consistency across Py/C++/R)
        run: bash conformance/induce.sh
      - name: nullable conformance (validity-mask nullable Int/boolean/string round-trip across Py/C++/R)
        run: bash conformance/nullable.sh
      - name: aux passthrough conformance (uns/@misc subtree round-trips verbatim across Py/C++/R)
        run: bash conformance/aux.sh
      - name: DE-bundle conformance (rank_genes_groups -> (factor,genes) bundle; lstar_markers Py + R)
        run: bash conformance/de.sh
      - name: cross-format conformance (AnnData <-> Seurat <-> SCE via L*)
        run: bash conformance/cross_format.sh
      - name: Seurat Tier-1 extras (DimReduc stdev -> measure; active Idents captured + restored)
        run: bash conformance/seurat_extras.sh
      - name: Seurat version variety (v3 Assay / v5 Assay5 / v5 split / SCTAssay / multimodal)
        run: bash conformance/seurat_versions.sh
      - name: SCE version variety (counts / +reducedDims / +altExps / +colData-rowData factors+metadata)
        run: bash conformance/sce_versions.sh
      - name: local real Seurat/SCE corpus (skips in CI; SeuratData/scRNAseq not installed)
        run: bash conformance/real_corpus_r.sh
      - name: collection conformance (collection of samples R -> L* -> Python)
        run: bash conformance/collection.sh
      - name: blocked-reader conformance (R/C++ bounded col stats == full read)
        run: bash conformance/stream_reduce.sh
      - name: fused-view reducer conformance (depth+log1p mean/var + grouped sum == in-memory)
        run: bash conformance/fused_view.sh
      - name: block-reader conformance (lstar_read_block / read_genes == full read)
        run: bash conformance/read_block.sh
      - name: R writer chunking/compression (R-written chunked+gzip readable by Py/C++)
        run: bash conformance/r_write_chunked.sh
      - name: disk-backed targets (backed AnnData always; Seurat+BPCells / SCE+HDF5Array skip if absent)
        run: bash conformance/backed_targets.sh

  js-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # make_store.py drives the Python L* writer (PYTHONPATH=python/src) to emit the test store.
      - run: pip install numpy scipy "zarr<3"
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.0          # bundles node 22.16 -> supports `node --experimental-strip-types`
          actions-cache-folder: emsdk-cache
      - name: install JS deps (zarrita)
        run: cd js && npm install
      - name: JS/WASM conformance (build WASM kernels + Node kernels/reader/view vs Python store)
        run: bash conformance/js.sh
