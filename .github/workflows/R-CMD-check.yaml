# Multi-platform `R CMD check` (the CRAN check farm, via CI) for the R package in `R/`.
# Standard r-lib/actions, pointed at the R/ subdirectory; the header-only core is vendored at
# R/inst/include and re-synced from core/ so the check always builds the current header.
name: R-CMD-check

on:
  push:
    branches: [main, v3]   # gate the long-lived v3 dev branch too (catch --as-cran issues before main)
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'devel'}      # win-builder replacement (win-builder times out on our vendored C++ compile; GHA has a ~6h limit)
          - {os: macos-latest,   r: 'devel'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # The heavy optional backends (Seurat, SCE + its Bioconductor chain, conos, pagoda2, BPCells,
      # HDF5Array) are NOT needed to build/check the package -- the vignette runs on base deps only
      # (eval=FALSE for the Seurat/SCE chunks), examples don't load them, and tests skip_if_not_installed.
      # Installing them makes this check slow + flaky (8-min BPCells source build, Bioconductor download
      # hiccups), so we check with hard deps only; the conversion code paths are exercised in the
      # `conformance` workflow + local checks. Tolerate the resulting "suggested but not available" NOTE.
      _R_CHECK_FORCE_SUGGESTS_: false
    steps:
      - uses: actions/checkout@v4

      # Sync the vendored core header so the R package builds against the current core/ (the R/ tree must
      # be self-contained for CRAN, but core/ is the source of truth in this repo). Bash on all 3 OSes.
      - name: Sync vendored core header
        shell: bash
        run: cp core/include/lstar/lstar.hpp R/inst/include/lstar/lstar.hpp

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: R
          dependencies: '"hard"'                       # Imports/Depends/LinkingTo only (skip heavy Suggests)
          extra-packages: |
            any::rcmdcheck
            any::knitr
            any::rmarkdown
            any::testthat

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: R
          upload-snapshots: true
          build_args: 'c("--no-manual")'
